server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:exam_system;DB_CLOSE_DELAY=-1;MODE=MSSQLServer
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

jwt:
  secret: ${JWT_SECRET:exam-system-dev-secret-key-change-me-change-me-change-me}
  expiration: ${JWT_EXPIRATION:86400000}