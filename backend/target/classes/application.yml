server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:exam_system;DB_CLOSE_DELAY=-1;MODE=MSSQLServer
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

jwt:
  secret: exam-system-secret-key-2026-very-long-secret-key-for-jwt-signing
  expiration: 86400000
